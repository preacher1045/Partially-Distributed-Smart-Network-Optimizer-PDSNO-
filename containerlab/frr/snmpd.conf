# snmpd.conf — shared across all PDSNO lab FRR nodes
# Community string: public (matches PDSNO scan_policy.yaml default)
#
# This enables SNMPv2c read-only access so PDSNO's SNMPScanner
# can query sysName, sysDescr, sysUpTime, and ifTable.

# Basic system info
sysLocation    PDSNO ContainerLab
sysContact     pdsno-lab@tenkei.dev
sysName        frr-node

# Allow read-only access from any host using community "public"
rocommunity public default

# Listen on all interfaces
agentAddress udp:161

# OIDs that PDSNO queries:
#   1.3.6.1.2.1.1.1.0  sysDescr
#   1.3.6.1.2.1.1.5.0  sysName
#   1.3.6.1.2.1.1.3.0  sysUpTime
#   1.3.6.1.2.1.2.2    ifTable
view   systemonly  included   .1.3.6.1.2.1.1
view   systemonly  included   .1.3.6.1.2.1.2
view   systemonly  included   .1.3.6.1.2.1.25.1

rouser authOnlyUser
