frr version 9.0
frr defaults traditional
!
! Portable lab config:
! - Update hostname and interface IP to match your topology.
! - Keep mgmt subnet/gateway aligned with containerlab mgmt settings.
! - This file is safe to customize per environment after cloning.
!
hostname frr-leaf-02
log syslog informational
no ipv6 forwarding
service integrated-vtysh-config
!
interface eth1
    ! eth1 is the management-facing interface in this topology.
    ip address 172.20.20.13/24
    description pdsno-mgmt
!
! Default route for outbound mgmt reachability (package install, troubleshooting).
! Change or remove if your lab does not use a gateway at .1.
ip route 0.0.0.0/0 172.20.20.1
!
line vty
!
end
